# .github/workflows/deploy.yml
name: Train & Deploy API

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      IMAGE_NAME: nguyenphat2904/gold-price:latest  # đổi thành tên image của bạn

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Train XGBoost model
      run: |
        python model/xgboost/train_xgb.py

    - name: Train LSTM model
      run: |
        python model/lstm/train_lstm.py

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t $IMAGE_NAME .

    - name: Push Docker image
      run: |
        docker push $IMAGE_NAME

    - name: Deploy to Render
      env:
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}  
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}        
      run: |
        curl -X POST "https://api.render.com/deploy/srv-${RENDER_SERVICE_ID}/manual" \
          -H "Authorization: Bearer ${RENDER_API_KEY}" \
          -H "Accept: application/json"