# .github/workflows/deploy.yml
name: Train & Deploy API

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      IMAGE_NAME: nguyenphat2904/gold-price:latest
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: pip install -r api/requirements.txt

    - name: Train XGBoost model
      run: python xgboost/train_xgboost.py

    - name: Train LSTM model
      run: python lstm/train_lstm.py

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build & Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          docker.io/${{ secrets.DOCKERHUB_USERNAME }}/gold-price:latest
          docker.io/${{ secrets.DOCKERHUB_USERNAME }}/gold-price:${{ github.sha }}

    - name: Trigger Render Deploy
      if: success()
      run: |
        echo "Triggering Render redeploy..."
        curl -X POST ${{ secrets.RENDER_SPRING_HOOK }}